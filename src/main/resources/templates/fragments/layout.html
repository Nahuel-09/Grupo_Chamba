<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Gestión de Inventario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div th:fragment="estructura_pagina(contenido_modulo)" class="container-fluid py-4">
        
        <div th:replace="~{fragments/navbar :: navbar_comun}"></div>

        <div class="row">
            <div class="col-md-3 mb-4">
                <div th:replace="~{fragments/sidebar :: sidebar_navegacion}"></div>
            </div>

            <div class="col-md-9">
                <div class="card p-4 shadow-sm min-vh-50">
                    <th:block th:replace="${contenido_modulo}"></th:block>
                </div>
            </div>
        </div>

        <div th:replace="~{fragments/footer :: footer_comun}"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
