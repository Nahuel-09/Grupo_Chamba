<div th:fragment="navbar_comun"
    class="d-flex justify-content-between align-items-center mb-4 p-3 bg-white shadow-sm rounded-3 border">
    
    <div class="d-flex align-items-center gap-3">
        <div class="inline-flex items-center justify-center bg-amber-500 text-white font-bold rounded-2 px-2.5 py-1 shadow-sm" style="background-color: #f59e0b !important;">
            SZ
        </div>
        <div>
            <h2 class="h5 fw-bold text-dark mb-0">Sistema de Gestión de Inventario</h2>
            <p class="text-muted small mb-0" style="font-size: 0.8rem;">
                Menú principal de la aplicación — Gran Hospital del Sur
            </p>
        </div>
    </div>

    <div class="d-flex align-items-center gap-4">
        <div class="text-end d-flex align-items-center gap-3">
            <div class="lh-sm">
                <span class="d-block fw-bold text-secondary text-capitalize" sec:authentication="name" style="font-size: 0.9rem;">Usuario</span>
                
                <span class="badge small" 
                      sec:authentication="principal.authorities"
                      th:classappend="${#strings.contains(#authentication.principal.authorities, 'ADMIN')} ? 'bg-dark' : (${#strings.contains(#authentication.principal.authorities, 'STOCK')} ? 'bg-warning text-dark' : 'bg-success')"
                      style="font-size: 0.75rem; letter-spacing: 0.05em;">
                      ROL
                </span>
            </div>
            
            <div class="p-2 bg-light rounded-circle text-muted d-none d-sm-block">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
            </div>
        </div>

        <form th:action="@{/logout}" method="post" class="m-0 border-start ps-3 border-light">
            <button class="btn btn-outline-danger btn-sm d-flex align-items-center gap-1.5 px-3 rounded-2" type="submit">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" />
                </svg>
                <span>Salir</span>
            </button>
        </form>
    </div>
</div>
