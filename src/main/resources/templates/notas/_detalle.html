<div xmlns:th="http://www.thymeleaf.org"
     th:fragment="tablaDetalle(detalles)">

    <div class="card border shadow-sm rounded-3 bg-white">
        <div class="card-header bg-light border-bottom text-secondary font-monospace small fw-bold py-2.5">
            <div class="d-flex align-items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                </svg>
                <span>Detalle de productos cargados</span>
            </div>
        </div>

        <div class="card-body p-0">
            <div class="alert alert-info border-0 rounded-0 m-0 py-3 text-center small" th:if="${#lists.isEmpty(detalles)}">
                Todavía no se agregaron productos al detalle operativo.
            </div>

            <div class="table-responsive" th:if="${!#lists.isEmpty(detalles)}">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light text-secondary font-monospace small border-bottom">
                        <tr>
                            <th class="py-2.5 ps-3">Producto</th>
                            <th class="py-2.5 text-center" style="width: 15%;">Cantidad</th>
                            <th class="py-2.5 text-end" style="width: 20%;">Precio</th>
                            <th class="py-2.5 text-end" style="width: 20%;">Subtotal</th>
                            <th class="py-2.5 text-center" style="width: 12%;">Acción</th>
                        </tr>
                    </thead>
                    <tbody class="text-dark">
                        <tr th:each="detalle, iter : ${detalles}">
                            <td class="ps-3 fw-medium" th:text="${detalle.producto.nombre}"></td>
                            
                            <td class="text-center font-monospace" th:text="${detalle.cantidad}"></td>
                            
                            <td class="text-end font-monospace" th:text="${detalle.precio}"></td>
                            
                            <td class="text-end font-monospace fw-bold text-secondary" th:text="${detalle.subtotal}"></td>
                            
                            <td class="text-center">
                                <a class="btn btn-sm btn-outline-danger d-inline-flex align-items-center p-2"
                                   th:href="@{/notas/detalle/eliminar/{index}(index=${iter.index})}"
                                   title="Quitar producto del detalle">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-16v1a3 3 0 003 3h4m-6-3a3 3 0 01-3-3V3a3 3 0 013-3h4a3 3 0 013 3v1" />
                                    </svg>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>
