<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Notas de Envío</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body th:replace="~{fragments/layout :: estructura_pagina(~{:: #seccion_notas})}">

    <div id="seccion_notas">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
                <h3 th:text="${title}">Notas de Envío</h3>
                <p class="text-muted small mb-0">Historial y registro de ingresos de mercadería al inventario.</p>
            </div>
            <a sec:authorize="hasAnyRole('ADMIN', 'STOCK')" class="btn btn-primary px-3" th:href="@{/notas/nueva}">
                Nueva Nota
            </a>
        </div>
        <hr>

        <div class="table-responsive">
            <table class="table table-striped table-hover border align-middle">
                <thead class="table-light">
                    <tr>
                        <th style="width: 8%;">ID</th>
                        <th>Fecha</th>
                        <th>Proveedor / Distribuidor</th>
                        <th>Estado</th>
                        <th>Items</th>
                        <th style="width: 18%; text-align: center;">Operaciones</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="nota : ${notas}">
                        <td th:text="${nota.id}" class="fw-bold text-primary"></td>
                        <td th:text="${nota.fecha}"></td>
                        <td th:text="${nota.proveedor}"></td>
                        <td>
                            <span class="badge bg-success" th:text="${nota.estadoTexto}"></span>
                        </td>
                        <td th:text="${#lists.size(nota.detalles)}" class="text-center fw-bold text-muted">0</td>
                        <td>
                            <div class="d-flex justify-content-center gap-2">
                                <a class="btn btn-sm btn-outline-primary" th:href="@{/notas/ver/{id}(id=${nota.id})}">
                                    Ver
                                </a>

                                <a class="btn btn-sm btn-danger"
                                   sec:authorize="hasAnyRole('ADMIN', 'STOCK')"
                                   th:if="${nota.editable}"
                                   th:href="@{/notas/eliminar/{id}(id=${nota.id})}">
                                    Eliminar
                                </a>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(notas)}">
                        <td colspan="6" class="text-center text-muted py-3">No hay notas de envío registradas en el sistema.</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="mt-3 pt-3 border-top">
            <a th:href="@{/}" class="btn btn-outline-secondary">
                Volver al Menú Principal
            </a>
        </div>
    </div>

</body>
</html>
