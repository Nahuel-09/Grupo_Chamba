<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Notas de Envío</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body th:replace="~{fragments/layout :: estructura_pagina(~{:: #seccion_notas})}">

    <div id="seccion_notas">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
                <h3 class="fw-bold text-dark" th:text="${title}">Notas de Envío</h3>
                <p class="text-muted small mb-0">Historial y registro de ingresos de mercadería al inventario.</p>
            </div>
            <a sec:authorize="hasAnyRole('ADMIN', 'STOCK')" class="btn btn-success d-flex align-items-center gap-2 px-3" th:href="@{/notas/nueva}">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                </svg>
                <span>Nueva Nota</span>
            </a>
        </div>
        <hr>

        <div class="table-responsive">
            <table class="table table-hover align-middle border mb-0">
                <thead class="table-light text-secondary font-monospace small">
                    <tr>
                        <th class="py-3" style="width: 8%;">ID</th>
                        <th class="py-3">Fecha</th>
                        <th class="py-3">Proveedor / Distribuidor</th>
                        <th class="py-3" style="width: 15%;">Estado</th>
                        <th class="py-3 text-center" style="width: 10%;">Items</th>
                        <th sec:authorize="hasAnyRole('ADMIN', 'STOCK')" class="text-center py-3" style="width: 15%;">Operaciones</th>
                    </tr>
                </thead>

                <tbody class="text-dark">
                    <tr th:each="nota : ${notas}">
                        <td th:text="${nota.id}" class="fw-bold text-secondary"></td>
                        <td th:text="${nota.fecha}" class="font-monospace small"></td>
                        <td th:text="${nota.proveedor}" class="fw-medium"></td>
                        <td>
                            <span class="badge px-2.5 py-1.5 text-uppercase" 
                                  th:text="${nota.estadoTexto}"
                                  th:classappend="${#strings.contains(#strings.toLowerCase(nota.estadoTexto), 'pend')} ? 'bg-warning text-dark' : 'bg-success'"
                                  style="font-size: 0.75rem; letter-spacing: 0.025em;">
                                  Estado
                            </span>
                        </td>
                        <td th:text="${#lists.size(nota.detalles)}" class="text-center font-monospace fw-bold text-secondary">0</td>
                        
                        <td>
                            <div class="d-flex justify-content-center gap-2">
                                <a class="btn btn-sm btn-outline-info d-inline-flex align-items-center p-2" 
                                   th:href="@{/notas/ver/{id}(id=${nota.id})}" 
                                   title="Ver Detalle de la Nota"
                                   style="color: #0284c7 !important; border-color: #38bdf8 !important;">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                    </svg>
                                </a>

                                <a class="btn btn-sm btn-outline-danger d-inline-flex align-items-center p-2"
                                   sec:authorize="hasAnyRole('ADMIN', 'STOCK')"
                                   th:if="${nota.editable}"
                                   th:href="@{/notas/eliminar/{id}(id=${nota.id})}"
                                   title="Eliminar Nota de Envío">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-16v1a3 3 0 003 3h4m-6-3a3 3 0 01-3-3V3a3 3 0 013-3h4a3 3 0 013 3v1" />
                                    </svg>
                                </a>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(notas)}">
                        <td colspan="6" class="text-center text-muted py-4 small">
                            No hay notas de envío registradas en el sistema.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="mt-4 pt-3 border-top">
            <a th:href="@{/}" class="btn btn-outline-secondary d-inline-flex align-items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                <span>Volver al Menú Principal</span>
            </a>
        </div>
    </div>

</body>
</html>
