<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Nueva Nota de Envío</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body th:replace="~{fragments/layout :: estructura_pagina(~{:: #formulario_notas})}">

    <div id="formulario_notas">
        <div class="mb-3">
            <h3 th:text="${title}">Nueva Nota de Envío</h3>
            <p class="text-muted small mb-0">Formulario transaccional para el ingreso y carga de stock al inventario.</p>
        </div>
        <hr>

        <div th:if="${error}" class="alert alert-danger py-2 small">
            <p th:text="${error}" class="mb-0 fw-bold"></p>
        </div>

        <form method="post">

            <div class="card shadow-sm mb-3">
                <div class="card-header bg-light fw-bold text-secondary">
                    Cabecera de la Nota
                </div>
                <div class="card-body">
                    <div class="row g-3 mb-3">
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Fecha *</label>
                            <input type="date" name="fecha" class="form-control" th:value="${nota.fecha}" required>
                        </div>

                        <div class="col-md-3">
                            <label class="form-label fw-bold">Nro. Comprobante</label>
                            <input type="number" name="nro" class="form-control" th:value="${nota.nro}" placeholder="Ej. 00214">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold">Proveedor / Distribuidor *</label>
                            <input type="text" name="proveedor" class="form-control" th:value="${nota.proveedor}" placeholder="Nombre del proveedor" required>
                        </div>
                    </div>

                    <div class="mb-1">
                        <label class="form-label fw-bold">Observación interna</label>
                        <textarea name="observacion" class="form-control" rows="2" th:text="${nota.observacion}" placeholder="Notas sobre el estado de la carga..."></textarea>
                    </div>

                    <input type="hidden" name="verificado" th:value="${nota.verificado}">
                    <input type="hidden" name="procesado" th:value="${nota.procesado}">
                </div>
            </div>

            <div class="card shadow-sm mb-3">
                <div class="card-header bg-light fw-bold text-success">
                    Agregar Producto al Detalle
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-5">
                            <label class="form-label fw-bold">Producto *</label>
                            <select name="productoId" class="form-select">
                                <option value="">Seleccione un producto...</option>
                                <option th:each="producto : ${productos}"
                                        th:value="${producto.id}"
                                        th:text="${producto.nombre}">
                                </option>
                            </select>
                        </div>

                        <div class="col-md-3">
                            <label class="form-label fw-bold">Cantidad *</label>
                            <input type="number" name="cantidad" class="form-control" min="1" placeholder="0">
                        </div>

                        <div class="col-md-3">
                            <label class="form-label fw-bold">Precio Unitario *</label>
                            <input type="number" name="precio" class="form-control" step="0.01" min="1" placeholder="0.00">
                        </div>

                        <div class="col-md-1 d-flex align-items-end">
                            <button type="submit" class="btn btn-success w-200 fw-bold" th:formaction="@{/notas/detalle/agregar}" title="Añadir ítem">
                                Añadir
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="mb-4">
                <div th:replace="~{notas/_detalle :: tablaDetalle(${detalles})}"></div>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary px-4" th:formaction="@{/notas/guardar}">
                    Guardar Nota de Envío
                </button>

                <a class="btn btn-outline-danger" th:href="@{/notas}">
                    Cancelar
                </a>

                <a th:href="@{/}" class="btn btn-outline-secondary ms-auto">
                    Menú Principal
                </a>
            </div>

        </form>
    </div>

</body>
</html>
