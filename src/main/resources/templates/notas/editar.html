<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Editar Nota de Envío</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body th:replace="~{fragments/layout :: estructura_pagina(~{:: #formulario_notas_editar})}">

    <div id="formulario_notas_editar">
        <div class="mb-3">
            <h3 class="fw-bold text-dark" th:text="${title}">Editar Nota de Envío</h3>
            <p class="text-muted small mb-0">Modificación de los datos de cabecera para el control y recepción de stock.</p>
        </div>
        <hr>

        <div th:if="${error}" class="alert alert-danger py-2 small">
            <p th:text="${error}" class="mb-0 fw-bold"></p>
        </div>

        <form th:action="@{/notas/actualizar/{id}(id=${nota.id})}" method="post">

            <div class="card border shadow-sm mb-4 bg-white rounded-3">
                <div class="card-header bg-light border-bottom text-secondary font-monospace small fw-bold py-2.5">
                    <div class="d-flex align-items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                        </svg>
                        <span>Cabecera de la Nota de Envío</span>
                    </div>
                </div>

                <div class="card-body">
                    <div class="row g-3 mb-3">
                        <div class="col-md-3">
                            <label class="form-label fw-bold small text-secondary">Fecha de Emisión *</label>
                            <input type="date" name="fecha" class="form-control text-dark font-monospace" th:value="${nota.fecha}" required>
                        </div>

                        <div class="col-md-3">
                            <label class="form-label fw-bold small text-secondary">Nro. de Comprobante</label>
                            <input type="number" name="nro" class="form-control font-monospace" th:value="${nota.nro}" placeholder="Ej. 0001">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold small text-secondary">Proveedor / Remitente *</label>
                            <input type="text" name="proveedor" class="form-control" th:value="${nota.proveedor}" placeholder="Nombre del proveedor o distribuidora" required>
                        </div>
                    </div>

                    <div class="mb-2">
                        <label class="form-label fw-bold small text-secondary">Observaciones internas</label>
                        <textarea name="observacion" class="form-control text-dark" rows="3" th:text="${nota.observacion}" placeholder="Detalles sobre el estado del envío, faltantes o condiciones de entrega..."></textarea>
                    </div>
                </div>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success px-4 d-inline-flex align-items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.212 8H18" />
                    </svg>
                    <span>Actualizar Cabecera</span>
                </button>

                <a class="btn btn-outline-danger d-inline-flex align-items-center gap-2" th:href="@{/notas/ver/{id}(id=${nota.id})}">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                    <span>Cancelar</span>
                </a>

                <a th:href="@{/}" class="btn btn-outline-secondary ms-auto d-inline-flex align-items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                    </svg>
                    <span>Menú Principal</span>
                </a>
            </div>

        </form>
    </div>

</body>
</html>
