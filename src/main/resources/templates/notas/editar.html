<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Editar Nota de Envío</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body th:replace="~{fragments/layout :: estructura_pagina(~{:: #formulario_notas_editar})}">

    <div id="formulario_notas_editar">
        <div class="mb-3">
            <h3 th:text="${title}">Editar Nota de Envío</h3>
            <p class="text-muted small mb-0">Modificación de los datos de cabecera para la recepción de stock.</p>
        </div>
        <hr>

        <div th:if="${error}" class="alert alert-danger py-2 small">
            <p th:text="${error}" class="mb-0 fw-bold"></p>
        </div>

        <form th:action="@{/notas/actualizar/{id}(id=${nota.id})}" method="post">

            <div class="card shadow-sm mb-4">
                <div class="card-header bg-light fw-bold text-secondary">
                    Cabecera de la Nota
                </div>

                <div class="card-body">
                    <div class="row g-3 mb-3">
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Fecha de Emisión *</label>
                            <input type="date" name="fecha" class="form-control" th:value="${nota.fecha}" required>
                        </div>

                        <div class="col-md-3">
                            <label class="form-label fw-bold">Nro. de Comprobante</label>
                            <input type="number" name="nro" class="form-control" th:value="${nota.nro}" placeholder="Ej. 0001">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold">Proveedor / Remitente *</label>
                            <input type="text" name="proveedor" class="form-control" th:value="${nota.proveedor}" placeholder="Nombre del proveedor o distribuidora" required>
                        </div>
                    </div>

                    <div class="mb-2">
                        <label class="form-label fw-bold">Observaciones internas</label>
                        <textarea name="observacion" class="form-control" rows="3" th:text="${nota.observacion}" placeholder="Detalles sobre el estado del envío, faltantes o condiciones de entrega..."></textarea>
                    </div>
                </div>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success px-4">
                    Actualizar Cabecera
                </button>

                <a class="btn btn-outline-danger" th:href="@{/notas/ver/{id}(id=${nota.id})}">
                    Cancelar
                </a>

                <a th:href="@{/}" class="btn btn-outline-secondary ms-auto">
                    Menú Principal
                </a>
            </div>

        </form>
    </div>

</body>
</html>
