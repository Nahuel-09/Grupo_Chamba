<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SZ53 - Control de Acceso</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8 border border-slate-200">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-blue-600 text-white font-bold text-2xl mb-3 shadow-md shadow-blue-200">
                SZ
            </div>
            <h2 class="text-2xl font-bold text-slate-800">Sistema de Gestión</h2>
            <p class="text-sm text-slate-500 mt-1">Introduce tus credenciales para ingresar</p>
        </div>
        <div th:if="${param.error}" class="mb-4 p-3 bg-red-50 border-l-4 border-red-500 text-red-700 text-sm rounded-r-md flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
            </svg>
            <span>Usuario o contraseña incorrectos.</span>
        </div>
        <div th:if="${param.logout}" class="mb-4 p-3 bg-green-50 border-l-4 border-green-500 text-green-700 text-sm rounded-r-md flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <span>Sesión cerrada correctamente.</span>
        </div>
        <form th:action="@{/login}" method="POST" class="space-y-5">
            <div>
                <label for="username" class="block text-sm font-semibold text-slate-700 mb-1.5">Nombre de Usuario</label>
                <div class="relative">
                    <input type="text" id="username" name="username" required autofocus
                           class="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-lg text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all text-sm"
                           placeholder="ej. admin">
                </div>
            </div>
            <div>
                <label for="password" class="block text-sm font-semibold text-slate-700 mb-1.5">Contraseña</label>
                <input type="password" id="password" name="password" required
                       class="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-lg text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all text-sm"
                       placeholder="••••••••">
            </div>
            <button type="submit" 
                    class="w-full mt-2 bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 px-4 rounded-lg shadow-md shadow-blue-200 hover:shadow-none transition-all duration-150 text-sm cursor-pointer">
                Iniciar Sesión
            </button>
        </form>
        <div class="text-center mt-6 pt-4 border-t border-slate-100">
            <p class="text-xs text-slate-400">&copy; 2026 Grupo Chamba. Proyecto de Grado.</p>
        </div>
    </div>
</body>
</html>
