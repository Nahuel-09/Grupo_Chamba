<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Clientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body th:replace="~{fragments/layout :: estructura_pagina(~{:: #formulario_clientes})}">

    <div id="formulario_clientes">
        <div class="mb-3">
            <h3 class="fw-bold text-dark" th:text="${title}">Gestión de Clientes</h3>
            <p class="text-muted small mb-0">Administración de datos y registros comerciales de clientes.</p>
        </div>
        <hr>

        <div th:if="${error}" class="alert alert-danger py-2 small">
            <p th:text="${error}" class="mb-0 fw-bold"></p>
        </div>

        <form th:action="${modoedicion}? @{/clientes/actualizar} : @{/clientes/guardar}" th:object="${cliente}" method="post">

            <input type="hidden" th:field="*{id}">

            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <label class="form-label fw-bold">Nombre Completo / Razón Social *</label>
                    <input class="form-control" type="text" th:field="*{nombre}" placeholder="Ej. Juan Pérez o Casa Central" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Documento (RUC / CI) *</label>
                    <input class="form-control" type="text" th:field="*{documento}" placeholder="Ej. 1234567-8 o 4567890" required>
                </div>
            </div>

            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <label class="form-label fw-bold">Teléfono</label>
                    <input class="form-control" type="text" th:field="*{telefono}" placeholder="Ej. 0981XXXXXX">
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold">Dirección</label>
                    <input class="form-control" type="text" th:field="*{direccion}" placeholder="Ej. Avda. Caballero c/ Artigas">
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold">Correo Electrónico</label>
                    <input class="form-control" type="email" th:field="*{email}" placeholder="ejemplo@correo.com">
                </div>
            </div>

            <div class="d-flex gap-2">
                <button class="btn btn-success px-4 d-inline-flex align-items-center gap-2" type="submit">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" />
                    </svg>
                    <span th:text="${modoedicion} ? 'Actualizar Cliente' : 'Guardar Cliente'">Guardar Cliente</span>
                </button>
                
                <a class="btn btn-outline-danger d-inline-flex align-items-center gap-2" th:href="@{/clientes}">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                    <span>Cancelar</span>
                </a>

                <a th:href="@{/}" class="btn btn-outline-secondary ms-auto d-inline-flex align-items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                    </svg>
                    <span>Menú Principal</span>
                </a>
            </div>

        </form>
    </div>
</body>
</html>
