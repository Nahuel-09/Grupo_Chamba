<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Catálogo de Clientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body th:replace="~{fragments/layout :: estructura_pagina(~{:: #seccion_clientes})}">

    <div id="seccion_clientes">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
                <h3 th:text="${title}">Catálogo de Clientes</h3>
                <p class="text-muted small mb-0">Listado y administración de clientes registrados.</p>
            </div>
            <a sec:authorize="hasAnyRole('ADMIN', 'VENDEDOR')" class="btn btn-primary px-3" th:href="@{/clientes/nuevo}">
                Nuevo Cliente
            </a>
        </div>
        <hr>

        <div class="table-responsive">
            <table class="table table-striped table-hover border align-middle">
                <thead class="table-light">
                    <tr>
                        <th style="width: 8%;">ID</th>
                        <th>Nombre / Razón Social</th>
                        <th>Documento</th>
                        <th>Teléfono</th>
                        <th>Email</th>
                        <th sec:authorize="hasAnyRole('ADMIN', 'VENDEDOR')" style="width: 18%; text-align: center;">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="cliente : ${clientes}">
                        <td th:text="${cliente.id}" class="fw-bold text-secondary"></td>
                        <td th:text="${cliente.nombre}"></td>
                        <td th:text="${cliente.documento}"></td>
                        <td th:text="${cliente.telefono}"></td>
                        <td th:text="${cliente.email}"></td>
                        
                        <td sec:authorize="hasAnyRole('ADMIN', 'VENDEDOR')">
                            <div class="d-flex justify-content-center gap-2">
                                <a class="btn btn-sm btn-warning" th:href="@{/clientes/editar/{id}(id=${cliente.id})}">
                                    Editar
                                </a>
                                <a class="btn btn-sm btn-danger" th:href="@{/clientes/eliminar/{id}(id=${cliente.id})}">
                                    Borrar
                                </a>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(clientes)}">
                        <td colspan="6" class="text-center text-muted py-3">No hay clientes registrados en el sistema.</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="mt-3 pt-3 border-top">
            <a th:href="@{/}" class="btn btn-outline-secondary">
                Volver al Menú Principal
            </a>
        </div>
    </div>

</body>
</html>
