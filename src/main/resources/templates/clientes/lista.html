<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Catálogo de Clientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body th:replace="~{fragments/layout :: estructura_pagina(~{:: #seccion_clientes})}">

    <div id="seccion_clientes">
        <!-- Encabezado con Botón de Creación -->
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
                <h3 class="fw-bold text-dark" th:text="${title}">Catálogo de Clientes</h3>
                <p class="text-muted small mb-0">Listado y administración de clientes registrados en el sistema.</p>
            </div>
            <!-- Botón alineado al color verde éxito institucional -->
            <a sec:authorize="hasAnyRole('ADMIN', 'VENDEDOR')" class="btn btn-success d-flex align-items-center gap-2 px-3" th:href="@{/clientes/nuevo}">
                <!-- SVG: Plus / Agregar -->
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                </svg>
                <span>Nuevo Cliente</span>
            </a>
        </div>
        <hr>

        <!-- Tabla de Datos Estilizada -->
        <div class="table-responsive">
            <table class="table table-hover align-middle border mb-0">
                <thead class="table-light text-secondary font-monospace small">
                    <tr>
                        <th class="py-3" style="width: 8%;">ID</th>
                        <th class="py-3">Nombre / Razón Social</th>
                        <th class="py-3">Documento</th>
                        <th class="py-3">Teléfono</th>
                        <th class="py-3">Email</th>
                        <th sec:authorize="hasAnyRole('ADMIN', 'VENDEDOR')" class="text-center py-3" style="width: 15%;">Acciones</th>
                    </tr>
                </thead>
                <tbody class="text-dark">
                    <!-- Fila Dinámica iterada con Thymeleaf -->
                    <tr th:each="cliente : ${clientes}">
                        <td th:text="${cliente.id}" class="fw-bold text-secondary"></td>
                        <td th:text="${cliente.nombre}" class="fw-medium"></td>
                        <td th:text="${cliente.documento}" class="font-monospace small"></td>
                        <td th:text="${cliente.telefono ?: '—'}"></td>
                        <td th:text="${cliente.email ?: '—'}" class="small text-muted"></td>
                        
                        <!-- Bloque de Acciones con SVGs -->
                        <td sec:authorize="hasAnyRole('ADMIN', 'VENDEDOR')" class="text-center">
                            <div class="d-flex justify-content-center gap-2">
                                <!-- Botón Editar (Amarillo/Ámbar institucional) -->
                                <a class="btn btn-sm btn-outline-warning d-inline-flex align-items-center p-2" 
                                   th:href="@{/clientes/editar/{id}(id=${cliente.id})}" 
                                   title="Editar Cliente"
                                   style="color: #d97706 !important; border-color: #f59e0b !important;">
                                    <!-- SVG: Lápiz -->
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                                    </svg>
                                </a>
                                <!-- Botón Borrar (Rojo peligro) -->
                                <a class="btn btn-sm btn-outline-danger d-inline-flex align-items-center p-2" 
                                   th:href="@{/clientes/eliminar/{id}(id=${cliente.id})}" 
                                   title="Eliminar Cliente">
                                    <!-- SVG: Tacho de Basura -->
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-16v1a3 3 0 003 3h4m-6-3a3 3 0 01-3-3V3a3 3 0 013-3h4a3 3 0 013 3v1" />
                                    </svg>
                                </a>
                            </div>
                        </td>
                    </tr>
                    <!-- Validación de Lista Vacía -->
                    <tr th:if="${#lists.isEmpty(clientes)}">
                        <td colspan="6" class="text-center text-muted py-4 small">
                            No hay clientes registrados en el sistema.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Botón de Retorno -->
        <div class="mt-4 pt-3 border-top">
            <a th:href="@{/}" class="btn btn-outline-secondary d-inline-flex align-items-center gap-2">
                <!-- SVG: Flecha izquierda -->
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                <span>Volver al Menú Principal</span>
            </a>
        </div>
    </div>

</body>
</html>
