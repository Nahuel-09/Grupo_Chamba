<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body th:replace="~{fragments/layout :: estructura_pagina(~{:: #formulario_producto})}">

    <div id="formulario_producto">
        <div class="mb-3">
            <h3 th:text="${title}">Gestión de Producto</h3>
            <p class="text-muted small mb-0">Carga de datos específicos, precios y clasificaciones de artículos.</p>
        </div>
        <hr>

        <div th:if="${error}" class="alert alert-danger py-2 small">
            <p th:text="${error}" class="mb-0 fw-bold"></p>
        </div>

        <form th:action="${modoedicion}? @{/productos/actualizar} : @{/productos/guardar}" 
              th:object="${dato}" method="post">
            
            <input type="hidden" th:field="*{id}">

            <div class="row g-3 mb-3">
                <div class="col-md-8">
                    <label for="nombre" class="form-label fw-bold">Nombre del Producto / Artículo *</label>
                    <input class="form-control" type="text" th:field="*{nombre}" id="nombre" 
                           placeholder="Ej. Cuaderno Universitario 100 Hojas" required maxlength="100">
                </div>
                
                <div class="col-md-4">
                    <label for="precio" class="form-label fw-bold">Precio Unitario *</label>
                    <input class="form-control" type="number" step="0.01" th:field="*{precio}" id="precio" 
                           placeholder="0.00" min="0" required>
                </div>
            </div>

            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <label for="categoria" class="form-label fw-bold">Categoría Asignada *</label>
                    <select class="form-select" th:field="*{categoria}" id="categoria" required>
                        <option value="">Seleccione una categoría...</option>
                        <option th:each="cat : ${categorias}" 
                                th:value="${cat.id}" 
                                th:text="${cat.nombre}">
                        </option>
                    </select>
                </div>
                
                <div class="col-md-6">
                    <label for="estado" class="form-label fw-bold">Estado Operativo *</label>
                    <select class="form-select" th:field="*{estado}" id="estado">
                        <option th:value="true">Activo (Disponible en catálogo)</option>
                        <option th:value="false">Inactivo (Fuera de circulación)</option>
                    </select>
                </div>
            </div>

            <div class="d-flex gap-2">
                <button class="btn btn-success px-4" type="submit">
                    Guardar Datos
                </button>
                
                <a class="btn btn-outline-danger" th:href="@{/productos/}">
                    Cancelar
                </a>

                <a th:href="@{/}" class="btn btn-outline-secondary ms-auto">
                    Menú Principal
                </a>
            </div>
        </form>
    </div>

</body>
</html>
