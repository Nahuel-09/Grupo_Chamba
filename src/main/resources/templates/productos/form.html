<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body th:replace="~{fragments/layout :: estructura_pagina(~{:: #formulario_producto})}">

    <div id="formulario_producto">
        <!-- Encabezado de Sección -->
        <div class="mb-3">
            <h3 class="fw-bold text-dark" th:text="${title}">Gestión de Producto</h3>
            <p class="text-muted small mb-0">Carga de datos específicos, precios y clasificaciones de artículos de stock.</p>
        </div>
        <hr>

        <!-- Mensajes de Error con Estilo -->
        <div th:if="${error}" class="alert alert-danger border-0 py-2.5 px-3 small d-flex align-items-center gap-2 rounded-2 shadow-sm mb-3">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
            <span th:text="${error}" class="fw-bold"></span>
        </div>

        <!-- Formulario Principal dentro de Tarjeta Limpia -->
        <div class="card border shadow-sm bg-white rounded-3 mb-4">
            <div class="card-body p-4 text-dark">
                <form th:action="${modoedicion}? @{/productos/actualizar} : @{/productos/guardar}" 
                      th:object="${dato}" method="post">
                    
                    <!-- ID Oculto -->
                    <input type="hidden" th:field="*{id}">

                    <!-- Fila 1: Nombre y Precio -->
                    <div class="row g-3 mb-3">
                        <div class="col-md-8">
                            <label for="nombre" class="form-label small fw-bold text-secondary">Nombre del Producto / Artículo *</label>
                            <input class="form-control text-dark" type="text" th:field="*{nombre}" id="nombre" 
                                   placeholder="Ej. Cuaderno Universitario 100 Hojas" required maxlength="100">
                        </div>
                        
                        <div class="col-md-4">
                            <label for="precio" class="form-label small fw-bold text-secondary">Precio Unitario *</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border font-monospace text-muted">$</span>
                                <input class="form-control font-monospace text-dark" type="number" step="0.01" th:field="*{precio}" id="precio" 
                                       placeholder="0.00" min="0" required>
                            </div>
                        </div>
                    </div>

                    <!-- Fila 2: Categoría y Estado -->
                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label for="categoria" class="form-label small fw-bold text-secondary">Categoría Asignada *</label>
                            <select class="form-select text-dark" th:field="*{categoria}" id="categoria" required>
                                <option value="">Seleccione una categoría...</option>
                                <option th:each="cat : ${categorias}" 
                                        th:value="${cat.id}" 
                                        th:text="${cat.nombre}">
                                </option>
                            </select>
                        </div>
                        
                        <div class="col-md-6">
                            <label for="estado" class="form-label small fw-bold text-secondary">Estado Operativo *</label>
                            <select class="form-select text-dark" th:field="*{estado}" id="estado">
                                <option th:value="true">Activo (Disponible en catálogo)</option>
                                <option th:value="false">Inactivo (Fuera de circulación)</option>
                            </select>
                        </div>
                    </div>

                    <hr class="my-3 border-light">

                    <!-- Botonera de Control Inferior -->
                    <div class="d-flex gap-2">
                        <button class="btn btn-success px-4 d-inline-flex align-items-center gap-2" type="submit">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                            </svg>
                            <span>Guardar Datos</span>
                        </button>
                        
                        <a class="btn btn-outline-danger d-inline-flex align-items-center gap-2" th:href="@{/productos/}">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                            </svg>
                            <span>Cancelar</span>
                        </a>

                        <a th:href="@{/}" class="btn btn-outline-secondary ms-auto d-inline-flex align-items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                            </svg>
                            <span>Menú Principal</span>
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
