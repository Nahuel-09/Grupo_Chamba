<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Catálogo de Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body th:replace="~{fragments/layout :: estructura_pagina(~{:: #seccion_productos})}">

    <div id="seccion_productos">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
                <h3 th:text="${title}">Catálogo de Productos</h3>
                <p class="text-muted small mb-0">Listado general de artículos, precios y disponibilidad en inventario.</p>
            </div>
            <a sec:authorize="hasAnyRole('ADMIN', 'STOCK')" class="btn btn-primary px-3" th:href="@{/productos/nuevo}">
                Nuevo Producto
            </a>
        </div>
        <hr>

        <div class="table-responsive">
            <table class="table table-striped table-hover border align-middle">
                <thead class="table-light">
                    <tr>
                        <th style="width: 8%;">ID</th>
                        <th>Nombre del Artículo</th>
                        <th>Categoría</th>
                        <th style="text-align: right; width: 15%;">Precio Unitario</th>
                        <th style="text-align: center; width: 12%;">Estado</th>
                        <th sec:authorize="hasAnyRole('ADMIN', 'STOCK')" style="width: 18%; text-align: center;">Acciones</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="prod : ${datos}">
                        <td th:text="${prod.id}" class="fw-bold text-secondary"></td>
                        <td th:text="${prod.nombre}"></td>
                        <td th:text="${prod.categoria != null ? prod.categoria.nombre : 'Sin categoría'}" class="text-muted small"></td>
                        <td th:text="${#numbers.formatDecimal(prod.precio, 1, 2)}" class="text-end fw-bold text-dark"></td>
                        <td class="text-center">
                            <span class="badge" th:classappend="${prod.estado} ? 'bg-success' : 'bg-danger'"
                                  th:text="${prod.estado ? 'Activo' : 'Inactivo'}">
                            </span>
                        </td>

                        <td sec:authorize="hasAnyRole('ADMIN', 'STOCK')">
                            <div class="d-flex justify-content-center gap-2">
                                <a class="btn btn-sm btn-warning" th:href="@{/productos/editar/{id}(id=${prod.id})}">
                                    Editar
                                </a>
                                <a class="btn btn-sm btn-danger" th:href="@{/productos/eliminar/{id}(id=${prod.id})}">
                                    Borrar
                                </a>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(datos)}">
                        <td colspan="6" class="text-center text-muted py-3">No hay productos registrados en el catálogo.</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="mt-3 pt-3 border-top">
            <a th:href="@{/}" class="btn btn-outline-secondary">
                Volver al Menú Principal
            </a>
        </div>
    </div>

</body>
</html>
