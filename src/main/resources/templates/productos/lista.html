<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Catálogo de Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body th:replace="~{fragments/layout :: estructura_pagina(~{:: #seccion_productos})}">

    <div id="seccion_productos">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
                <h3 class="fw-bold text-dark" th:text="${title}">Catálogo de Productos</h3>
                <p class="text-muted small mb-0">Listado general de artículos, precios y disponibilidad en el inventario.</p>
            </div>
            <a sec:authorize="hasAnyRole('ADMIN', 'STOCK')" class="btn btn-success d-flex align-items-center gap-2 px-3" th:href="@{/productos/nuevo}">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                </svg>
                <span>Nuevo Producto</span>
            </a>
        </div>
        <hr>

        <div class="table-responsive">
            <table class="table table-hover align-middle border mb-0">
                <thead class="table-light text-secondary font-monospace small">
                    <tr>
                        <th class="py-3" style="width: 8%;">ID</th>
                        <th class="py-3">Nombre del Artículo</th>
                        <th class="py-3" style="width: 20%;">Categoría</th>
                        <th class="py-3 text-end" style="width: 15%;">Precio Unitario</th>
                        <th class="py-3 text-center" style="width: 12%;">Estado</th>
                        <th sec:authorize="hasAnyRole('ADMIN', 'STOCK')" class="text-center py-3" style="width: 15%;">Acciones</th>
                    </tr>
                </thead>

                <tbody class="text-dark">
                    <tr th:each="prod : ${datos}">
                        <td th:text="${prod.id}" class="fw-bold text-secondary"></td>
                        <td th:text="${prod.nombre}" class="fw-medium"></td>
                        <td>
                            <span th:text="${prod.categoria != null ? prod.categoria.nombre : 'Sin categoría'}" 
                                  class="badge bg-light text-secondary border px-2 py-1.5 fw-normal">
                            </span>
                        </td>
                        <td th:text="${#numbers.formatDecimal(prod.precio, 1, 2)}" class="text-end font-monospace fw-bold text-secondary"></td>
                        <td class="text-center">
                            <span class="badge px-2.5 py-1.5 text-uppercase" 
                                  th:classappend="${prod.estado} ? 'bg-success' : 'bg-danger'"
                                  th:text="${prod.estado ? 'Activo' : 'Inactivo'}"
                                  style="font-size: 0.75rem; letter-spacing: 0.025em;">
                            </span>
                        </td>

                        <td sec:authorize="hasAnyRole('ADMIN', 'STOCK')">
                            <div class="d-flex justify-content-center gap-2">
                                <a class="btn btn-sm btn-outline-warning d-inline-flex align-items-center p-2" 
                                   th:href="@{/productos/editar/{id}(id=${prod.id})}"
                                   title="Editar Producto"
                                   style="color: #d97706 !important; border-color: #f59e0b !important;">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                                    </svg>
                                </a>
                                
                                <a class="btn btn-sm btn-outline-danger d-inline-flex align-items-center p-2" 
                                   th:href="@{/productos/eliminar/{id}(id=${prod.id})}"
                                   title="Eliminar Producto">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-16v1a3 3 0 003 3h4m-6-3a3 3 0 01-3-3V3a3 3 0 013-3h4a3 3 0 013 3v1" />
                                    </svg>
                                </a>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(datos)}">
                        <td colspan="6" class="text-center text-muted py-4 small">
                            No hay productos registrados en el catálogo.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="mt-4 pt-3 border-top">
            <a th:href="@{/}" class="btn btn-outline-secondary d-inline-flex align-items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                <span>Volver al Menú Principal</span>
            </a>
        </div>
    </div>

</body>
</html>
