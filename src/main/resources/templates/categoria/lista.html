<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Catálogo de Categorías</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body th:replace="~{fragments/layout :: estructura_pagina(~{:: #bloque_categorias})}">

    <div id="bloque_categorias">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
                <h3 th:text="${title}">Catálogo de Categorías</h3>
            </div>
            <a sec:authorize="hasAnyRole('ADMIN', 'STOCK')" class="btn btn-primary" th:href="@{/categorias/nuevo}">
                Nueva Categoría
            </a>
        </div>
        <hr>

        <table class="table table-striped table-hover border align-middle">
            <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Nombre de la Categoría</th>
                    <th sec:authorize="hasAnyRole('ADMIN', 'STOCK')" class="text-center">Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="cat : ${categorias}">
                    <td th:text="${cat.id}">1</td>
                    <td th:text="${cat.nombre}">Resmas</td>
                    <td sec:authorize="hasAnyRole('ADMIN', 'STOCK')" class="text-center">
                        <a class="btn btn-sm btn-warning" th:href="@{/categorias/editar/{id}(id=${cat.id})}">Editar</a>
                        <a class="btn btn-sm btn-danger" th:href="@{/categorias/eliminar/{id}(id=${cat.id})}">Borrar</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(categorias)}">
                    <td colspan="6" class="text-center text-muted py-3">No hay categorias registradas.</td>
                </tr>
            </tbody>
        </table>

        <div class="mt-3 pt-3 border-top">
            <a th:href="@{/}" class="btn btn-outline-secondary"> Volver al Inicio</a>
        </div>
    </div>

</body>
</html>
