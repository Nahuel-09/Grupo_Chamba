<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Catálogo de Categorías</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body th:replace="~{fragments/layout :: estructura_pagina(~{:: #bloque_categorias})}">

    <div id="bloque_categorias">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
                <h3 class="fw-bold text-dark" th:text="${title}">Catálogo de Categorías</h3>
                <p class="text-muted small mb-0">Listado general para la clasificación de productos en inventario.</p>
            </div>
            <a sec:authorize="hasAnyRole('ADMIN', 'STOCK')" class="btn btn-success d-flex align-items-center gap-2 px-3" th:href="@{/categorias/nuevo}">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                </svg>
                <span>Nueva Categoría</span>
            </a>
        </div>
        <hr>

        <div class="table-responsive">
            <table class="table table-hover align-middle border mb-0">
                <thead class="table-light text-secondary font-monospace small">
                    <tr>
                        <th class="py-3" style="width: 10%;">ID</th>
                        <th class="py-3">Nombre de la Categoría</th>
                        <th sec:authorize="hasAnyRole('ADMIN', 'STOCK')" class="text-center py-3" style="width: 20%;">Acciones</th>
                    </tr>
                </thead>
                <tbody class="text-dark">
                    <tr th:each="cat : ${categorias}">
                        <td class="fw-bold text-secondary" th:text="${cat.id}">1</td>
                        <td th:text="${cat.nombre}">Resmas</td>
                        <td sec:authorize="hasAnyRole('ADMIN', 'STOCK')" class="text-center">
                            <div class="d-flex justify-content-center gap-2">
                                <a class="btn btn-sm btn-outline-warning d-inline-flex align-items-center p-2" 
                                   th:href="@{/categorias/editar/{id}(id=${cat.id})}" 
                                   title="Editar Categoría"
                                   style="color: #d97706 !important; border-color: #f59e0b !important;">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                                    </svg>
                                </a>
                                <a class="btn btn-sm btn-outline-danger d-inline-flex align-items-center p-2" 
                                   th:href="@{/categorias/eliminar/{id}(id=${cat.id})}" 
                                   title="Eliminar Categoría">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-16v1a3 3 0 003 3h4m-6-3a3 3 0 01-3-3V3a3 3 0 013-3h4a3 3 0 013 3v1" />
                                    </svg>
                                </a>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(categorias)}">
                        <td colspan="3" class="text-center text-muted py-4 small">
                            No hay categorías registradas en el sistema.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="mt-4 pt-3 border-top">
            <a th:href="@{/}" class="btn btn-outline-secondary d-inline-flex align-items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                <span>Volver al Inicio</span>
            </a>
        </div>
    </div>

</body>
</html>
