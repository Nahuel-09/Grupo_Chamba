<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Categoría</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body th:replace="~{fragments/layout :: estructura_pagina(~{:: #formulario_categoria})}">

    <div id="formulario_categoria">
        <div class="mb-3">
            <h3 th:text="${title}">Gestión de Categoría</h3>
            <p class="text-muted small mb-0">Ingrese los datos para la clasificación del inventario.</p>
        </div>
        <hr>

        <div th:if="${error}" class="alert alert-danger py-2 small">
            <p th:text="${error}" class="mb-0 fw-bold"></p>
        </div>

        <form th:action="${modoedicion}? @{/categorias/actualizar} : @{/categorias/guardar}" 
              th:object="${categoria}" method="post">
            
            <input type="hidden" th:field="*{id}" />

            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <label for="nombre" class="form-label fw-bold">Nombre de la Categoría *</label>
                    <input type="text" th:field="*{nombre}" id="nombre" class="form-control" 
                           placeholder="Ej. Resmas, Escritorio, Tintas" required />
                </div>
            </div>

            <div class="d-flex gap-2">
                <button class="btn btn-success px-4" type="submit">
                    Enviar Datos
                </button>
                
                <a class="btn btn-outline-danger" th:href="@{/categorias/}">
                    Cancelar
                </a>

                <a th:href="@{/}" class="btn btn-outline-secondary ms-auto">
                    Menú Principal
                </a>
            </div>
        </form>
    </div>

</body>
</html>
